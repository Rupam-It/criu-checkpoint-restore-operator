apiVersion: v1
kind: Pod
metadata:
  name: trigger-all-pod
  namespace: default
  labels:
    app: trigger-all
spec:
  containers:
  - name: app
    image: registry.k8s.io/pause:3.9
    resources:
      requests:
        cpu: 10m
        memory: 8Mi
      limits:
        cpu: 100m
        memory: 64Mi
