apiVersion: criu.org/v1
kind: CheckpointSchedule
metadata:
  name: trigger-all
  namespace: default
spec:
  namespace: default
  selector:
    matchLabels:
      app: trigger-all
  triggers:
    interval: 5s
    onAnnotation: true
    resourceThreshold:
      # pause container is always idle; lower bounds fire immediately on the
      # first poll since CPU and memory usage are well below 50% of the limit
      cpuPercent:
        upper: 95
        lower: 50
      memoryPercent:
        upper: 90
        lower: 50
      pollIntervalSeconds: 10
    onKubernetesEvents:
      - NodeDrain
      - PodEviction
      - Preemption
